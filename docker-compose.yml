version: "3.8"

services:

  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: ecommerce_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin1234
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Backend API
  backend:
    image: allyyahmad/ecommerce-backend:latest
    container_name: ecommerce_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:admin1234@mongodb:27017/?authSource=admin
      JWT_SECRET: pikachuuu
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin1234
      STRIPE_SECRET_KEY: your-stripe-key
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/backend/uploads

  # Frontend (Customer Store)
  frontend:
    image: node:20-alpine
    container_name: ecommerce_frontend
    restart: always
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://16.16.78.187:3000
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

  # Admin Panel
  admin:
    image: node:20-alpine
    container_name: ecommerce_admin
    restart: always
    working_dir: /app
    ports:
      - "5174:5174"
    environment:
      - VITE_BACKEND_URL=http://16.16.78.187:3000
    volumes:
      - ./admin:/app
    command: sh -c "npm install && npm run dev -- --host --port 5174"

volumes:
  mongo_data:
  uploads_data:
